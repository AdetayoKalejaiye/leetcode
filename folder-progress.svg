<svg xmlns="http://www.w3.org/2000/svg" width="500" height="35">
  <!-- Background -->
  <rect width="500" height="35" rx="6" fill="#333333"/>

  <!-- Label -->
  <text x="12" y="22" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="12" fill="#ffffff" font-weight="bold">Folders</text>

  <!-- Progress track -->
  <rect x="80" y="9" width="380" height="17" rx="4" fill="#555555"/>

  <!-- Progress fill: (CURRENT/TOTAL) * 380 = width -->
  <!-- CURRENT=3, TOTAL=500, fill_width=2 (minimum 2 so it's visible) -->
  <rect x="80" y="9" width="2" height="17" rx="4" fill="#00c853"/>

  <!-- Text: count -->
  <text x="488" y="22" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11" fill="#cccccc" text-anchor="end">3 / 500</text>
</svg>
