name: Update Folder Progress

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Count folders and update README
        run: |
          CURRENT=$(find . -mindepth 1 -maxdepth 1 -type d \
            ! -name '.git' \
            ! -name '.github' \
            | wc -l | tr -d ' ')

          echo "Folders found: $CURRENT"

          README_FILE=$(find . -maxdepth 1 -iname "readme.md" | head -1)
          echo "README found at: $README_FILE"

          sed -i "s|progressbar.maheshwari.dev/[0-9]*/500|progressbar.maheshwari.dev/${CURRENT}/500|g" "$README_FILE"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update folder progress [skip ci]"
          git push
